# 可用数据集的发现配置

[us_futures]
market = "us_futures"
timeframe = "1d"
min_bars = 250
start = "2024-01-01"
end = "2026-06-14"
warmup = 100
# 自动发现: 读取 data/us_futures/*/1d.parquet 中 min_bars 符合条件的品种

[cn_etf]
market = "cn_etf"
timeframe = "1d"
min_bars = 500
start = "2020-01-01"
end = "2026-06-14"
warmup = 220
# 数据最丰富: ~1500 bars, 2020~2026

[us_stocks_weekly]
market = "us_stocks"
timeframe = "1w"
min_bars = 100
start = "2020-01-01"
end = "2026-06-14"
warmup = 50
# 26 个品种周线 ~250 bars
